# Prefix key — use C-f instead of default C-b (easier to reach)
unbind C-b
bind-key C-f send-prefix

# Split windows — vim-style: s for horizontal, v for vertical
# Opens new panes in the current pane's working directory
bind s split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
# remove default horizontal split
unbind '"'
# remove default vertical split
unbind %

# Swap windows left/right without prefix (Ctrl+Shift+h/l)
bind-key -n C-S-h swap-window -t -1
bind-key -n C-S-l swap-window -t +1

# Swap windows left/right with prefix (C-h/C-l), -d keeps focus on moved window
bind-key C-h swap-window -t -1 -d
bind-key C-l swap-window -t +1 -d

# Window operations
bind r command-prompt "rename-window %%"  # prefix + r to rename
bind R source-file ~/.config/tmux/tmux.conf  # prefix + R to reload config
bind z resize-pane -Z  # prefix + z to toggle pane zoom
bind \; last-window  # prefix + ; to jump to last active window

# Popups — floating overlays for tools
bind-key g display-popup -E -w 90% -h 90% -T "git" lazygit  # prefix + g for lazygit
bind-key F display-popup -E -w 90% -h 90% -T "scratch"  # prefix + F for scratch shell

# Pane navigation with prefix (vim-style hjkl)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane navigation without prefix (Alt+hjkl)
# Detects if the active pane is running vim/nvim/fzf and forwards the key instead
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n M-h if-shell "$is_vim" 'send-keys M-h' 'select-pane -L'
bind-key -n M-j if-shell "$is_vim" 'send-keys M-j' 'select-pane -D'
bind-key -n M-k if-shell "$is_vim" 'send-keys M-k' 'select-pane -U'
bind-key -n M-l if-shell "$is_vim" 'send-keys M-l' 'select-pane -R'

# Move panes to adjacent positions with prefix + Shift+hjkl
bind H swap-pane -s '{left-of}'
bind J swap-pane -s '{down-of}'
bind K swap-pane -s '{up-of}'
bind L swap-pane -s '{right-of}'

