# Terminal behavior (options only — key maps live in keybinds.conf / nav.conf)

# disable input method editor on Wayland
wayland_enable_ime no
enable_audio_bell no
scrollback_lines 3000

# Clipboard / selection
# auto-copy selected text to clipboard
copy_on_select no
# strip trailing whitespace on copy when not in bracketed paste
strip_trailing_spaces smart

# enable shell integration for jump-to-prompt, cwd reporting (powers --cwd=current)
shell_integration enabled

map ctrl+l clear_terminal scroll active
