# Fonts
font_size 14

font_family      Iosevka Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto

# Iosevka ligatures live in `calt`, which kitty enables by default —
# no font_features line needed. Real Italic/BoldItalic faces are
# auto-detected above, so italics are designed glyphs, not synthesized.

# Optional: opt into stylistic sets / character variants, e.g.
font_features IosevkaNFM      +ss08   # a curated alternate letterform set
font_features IosevkaNFM-Bold +ss08
# Run `kitty +list-fonts --psnames` to confirm PostScript names.

# --- Previous fonts (kept for reference) ---
# JetBrains Mono:
#   font_family JetBrainsMono Nerd Font
# Inconsolata (ligatures are in dlig, off by default — must enable):
#   font_family Inconsolata Nerd Font Mono
#   bold_font   Inconsolata Nerd Font Mono Bold
#   font_features InconsolataNFM-Regular +dlig
#   font_features InconsolataNFM-Bold    +dlig
