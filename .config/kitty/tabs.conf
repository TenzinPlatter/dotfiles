# Tab bar (tmux: the window list). Mirrors tmux `status-position top`.
# Colors come from theme.conf; this file only controls structure/style.
tab_bar_edge        top
tab_bar_style       powerline
tab_powerline_style slanted
tab_bar_align       left
# hide the bar entirely when there's only one tab
tab_bar_min_tabs    2
tab_title_template  "{index}: {title}"
