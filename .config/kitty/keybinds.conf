# ════════════════════════════════════════════════════════════════════
#  Keybinds — native kitty flow, ported from tmux (prefix C-f).
#  Navigation (Alt+hjkl) lives in nav.conf.
# ════════════════════════════════════════════════════════════════════

# ── Disable conflicting / unwanted defaults ─────────────────────────
# default new OS window — keep new windows inside tabs instead
map ctrl+shift+n no_op
# DE / new-tab via super+t handled by kitty's own ctrl+shift+t
map super+t      no_op

# ── Input fixups ────────────────────────────────────────────────────
# send escape + return (distinguishable from plain enter)
map shift+enter    send_text all \e\r
# send escape + DEL for backward-kill-word in shell
map ctrl+backspace send_text all \x1b\x7f

# ════════════════════════════════════════════════════════════════════
#  Splits  (tmux: panes)
# ════════════════════════════════════════════════════════════════════
# tmux `prefix s` -> split below ; `prefix v` -> split right. cwd inherited.
map ctrl+shift+5 launch --location=hsplit --cwd=current
map ctrl+shift+' launch --location=vsplit --cwd=current

# Move / swap the focused split in a direction (tmux `prefix H/J/K/L`)
map ctrl+shift+alt+h move_window left
map ctrl+shift+alt+j move_window down
map ctrl+shift+alt+k move_window up
map ctrl+shift+alt+l move_window right

# Zoom the focused split (tmux `prefix z`)
map ctrl+shift+z toggle_layout stack

# Close the focused split — kitty default ctrl+shift+w (left as default)

# ════════════════════════════════════════════════════════════════════
#  Tabs  (tmux: windows)
# ════════════════════════════════════════════════════════════════════
# New tab in the current dir (tmux `prefix c`)
map ctrl+shift+t new_tab_with_cwd

# Reorder current tab left/right (tmux `C-S-h` / `C-S-l` swap-window).
# This overrides kitty's default ctrl+shift+h (show_scrollback) — see ctrl+shift+u.
map ctrl+shift+h move_tab_backward
map ctrl+shift+l move_tab_forward

# Jump straight to a tab (tmux `prefix <n>`)
map ctrl+1 goto_tab 1
map ctrl+2 goto_tab 2
map ctrl+3 goto_tab 3
map ctrl+4 goto_tab 4
map ctrl+5 goto_tab 5
map ctrl+6 goto_tab 6
map ctrl+7 goto_tab 7
map ctrl+8 goto_tab 8
map ctrl+9 goto_tab 9
# next/prev tab stay on kitty defaults: ctrl+shift+] and ctrl+shift+[

# Rename the current tab (tmux `prefix r`)
map ctrl+shift+r set_tab_title

# ════════════════════════════════════════════════════════════════════
#  Overlays  (tmux: display-popup)
# ════════════════════════════════════════════════════════════════════
# lazygit (tmux `prefix g`)
map ctrl+shift+g      launch --type=overlay --cwd=current --title git lazygit
# scratch shell (tmux `prefix F`)
map ctrl+shift+period launch --type=overlay --cwd=current --title scratch

# Project / session picker (tmux `prefix O` / `prefix t`).
# kitty-sesh picks a dir and opens it as a new tab rooted there.
map ctrl+shift+o      launch --type=overlay --title sessions kitty-sesh

# ════════════════════════════════════════════════════════════════════
#  Scrollback  (tmux: copy-mode)
# ════════════════════════════════════════════════════════════════════
# Browse scrollback in the pager (ctrl+shift+h was reassigned to tab-reorder)
map ctrl+shift+u show_scrollback
