# Theme
include theme.conf

# Font Configuration
font_family      JetbrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 14

# Appearance
# background_opacity 0.90
# allow runtime opacity changes via remote control
dynamic_background_opacity yes
# background_blur 32
window_padding_width 12
# remove title bar and window borders
hide_window_decorations yes

# Cursor Configuration
cursor_shape block
cursor_blink_interval 1
# number of trail cursors to render
cursor_trail 3
# fade start and end times in seconds
cursor_trail_decay 0.1 0.4

# Performance Settings (minimize latency, higher energy usage)
# no buffering of input, send immediately
input_delay 0
# near-zero delay between screen repaints (ms)
repaint_delay 2
# don't wait for vsync, prioritize responsiveness
sync_to_monitor no

# Terminal Features
# enable kitty remote control protocol
allow_remote_control yes
# disable input method editor on Wayland
wayland_enable_ime no
enable_audio_bell no
scrollback_lines 3000
# auto-copy selected text to clipboard
copy_on_select no
# strip trailing whitespace on copy when not in bracketed paste
strip_trailing_spaces smart
# enable shell integration for jump-to-prompt, etc.
shell_integration enabled

# Key Mappings
# send escape + return (distinguishable from plain enter)
map shift+enter send_text all \e\r
# send escape + DEL for backward-kill-word in shell
map ctrl+backspace send_text all \x1b\x7f
# disable default new tab
map super+t no_op
# disable default new window
map ctrl+shift+n no_op
# disable default select graphics placement
map ctrl+shift+s no_op
# disable default pass selection to program
map ctrl+shift+o no_op

# Machine-specific Configuration
include machine.conf
