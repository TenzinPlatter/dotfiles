# Seamless navigation between kitty splits and Neovim windows (Alt+hjkl).
#
# smart-splits.nvim sets the `IS_NVIM` user-var on the focused kitty window.
# While that var is set, the maps below are unset so the keys reach Neovim;
# otherwise kitty moves between its own splits. Requires kitty >= 0.42.
map alt+h neighboring_window left
map alt+j neighboring_window down
map alt+k neighboring_window up
map alt+l neighboring_window right

map --when-focus-on var:IS_NVIM alt+h
map --when-focus-on var:IS_NVIM alt+j
map --when-focus-on var:IS_NVIM alt+k
map --when-focus-on var:IS_NVIM alt+l

# ── Remote tmux caveat ──────────────────────────────────────────────
# When you ssh into a host and run tmux there, the local kitty window is NOT
# running nvim, so kitty grabs Alt+hjkl before they reach the remote tmux.
# To make Alt+hjkl pass through to a remote tmux too, have that tmux set a
# kitty user-var on attach and uncomment the unmaps below. (Ask to wire this up.)
# map --when-focus-on var:IN_TMUX alt+h
# map --when-focus-on var:IN_TMUX alt+j
# map --when-focus-on var:IN_TMUX alt+k
# map --when-focus-on var:IN_TMUX alt+l
